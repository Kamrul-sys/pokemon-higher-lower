<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Cache-busting CSS -->
    <link rel="stylesheet" href="style.css?v=4">

    <title>Pokémon Higher or Lower</title>
</head>

<body>

    <div id="pageWrap">

        <h1>Pokémon Higher or Lower</h1>

        <p id="score">Score: 0</p>

        <button id="startBtn">Start Game</button>

        <div id="game" style="display: none;">

            <div class="container">

                <!-- LEFT CARD -->
                <div class="card">
                    <img id="leftImg" src="" alt="Left Pokémon">
                    <p id="leftName">...</p>
                    <button id="leftBtn">Choose Left</button>
                </div>

                <!-- RIGHT CARD -->
                <div class="card">
                    <img id="rightImg" src="" alt="Right Pokémon">
                    <p id="rightName">...</p>
                    <button id="rightBtn">Choose Right</button>
                </div>

            </div>

            <p id="result"></p>

        </div>

    </div>

    <!-- Cache-busting JS -->
    <script src="script.js?v=3"></script>

</body>
</html>
